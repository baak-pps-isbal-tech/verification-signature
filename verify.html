<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISURATS2 - Verifikasi Digital</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- SHA256 Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>

    <style>
        /* --- Modern Reset & Variables --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #004A7C 0%, #0056b3 100%);
            --success-gradient: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            --danger-gradient: linear-gradient(135deg, #dc3545 0%, #bd2130 100%);
            --warning-gradient: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --bg-light: #f5f6fa;
            --white: #ffffff;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Main Container --- */
        .verification-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 20px;
            position: relative;
        }

        /* --- Card Style --- */
        .card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- Header Section --- */
        .card-header {
            background: var(--primary-gradient);
            padding: 30px 20px;
            text-align: center;
            color: var(--white);
            position: relative;
        }

        /* Logo Style */
        .card-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        .card-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-header .sub-title {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* --- Content Section --- */
        .card-body {
            padding: 0;
        }

        /* --- Status Message --- */
        .status-section {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        .status-badge.success { background: var(--success-gradient); }
        .status-badge.failed { background: var(--danger-gradient); }
        .status-badge.warning { background: var(--warning-gradient); color: #333; }

        .status-badge i { margin-right: 8px; font-size: 1.1rem; }

        .status-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* --- Data List --- */
        .data-list-container {
            padding: 20px;
        }

        .data-list-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            font-weight: 700;
            margin-bottom: 15px;
            padding: 8px 15px;
            /* Background Style */
            background: var(--primary-gradient);
            border-radius: 4px;
            display: inline-block;
        }

        .data-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }

        .data-item:last-child { border-bottom: none; }

        .data-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .data-label i {
            margin-right: 8px;
            width: 16px;
            text-align: center;
            color: #a4b0be;
        }

        .data-value {
            font-weight: 600;
            color: var(--text-dark);
            text-align: right;
            font-size: 0.9rem;
            max-width: 60%;
            word-break: break-word;
        }

        /* --- Footer --- */
        .card-footer {
            background: #fafafa;
            padding: 15px;
            text-align: center;
            font-size: 0.75rem;
            color: #a4b0be;
        }

        /* --- Loading State --- */
        .loading-state {
            padding: 60px 20px;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 20px auto;
            animation: spin 1s linear infinite;
        }

        /* --- Animations --- */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="verification-wrapper">
        <div class="card" id="mainCard">
            <div class="card-header">
                <!-- Logo Placeholder (Ganti src dengan URL asli) -->
                <img src="Logo_ISB_atma_luhur_final.png" alt="Logo ISB Atma Luhur">
                <h1>Verifikasi Dokumen Digital</h1>
                <div class="sub-title">
                    SISURATS2 v.1.0.3<br>Sistem Informasi Surat Akademik S2 Program Pascasarjana<br>
                    Institut Sains dan Bisnis Atma Luhur
                </div>
            </div>
            <div class="card-body" id="results">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p style="color: var(--text-muted);">Memvalidasi keaslian dokumen...</p>
                </div>
            </div>
            <div class="card-footer">
                IT Division BAAK Program Pascasarjana - ISB Atma Luhur
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // Konstanta Keamanan
            const SECRET_KEY = "ISB_ATMA_LUHUR_KTM_2023_SECURE_KEY";
            const ALGORITHM_VERSION = "1.0";

            const urlParams = new URLSearchParams(window.location.search);
            const version = urlParams.get('v');
            const encryptedData = urlParams.get('d');
            const resultsDiv = document.getElementById('results');

            if (!version || !encryptedData) {
                updateUIFailed("URL Tidak Valid", "Parameter verifikasi tidak ditemukan.");
                return;
            }

            function customHash(data) {
                const sha256Hash = sha256(data);
                const partLength = Math.floor(sha256Hash.length / 4);
                const parts = [
                    sha256Hash.substring(0, partLength),
                    sha256Hash.substring(partLength, 2*partLength),
                    sha256Hash.substring(2*partLength, 3*partLength),
                    sha256Hash.substring(3*partLength)
                ];
                
                const rotatedParts = [];
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    const rotation = (i + 1) % part.length;
                    const rotatedPart = part.substring(rotation) + part.substring(0, rotation);
                    rotatedParts.push(rotatedPart);
                }
                
                const combined = rotatedParts.join('') + SECRET_KEY;
                const finalHash = sha256(combined);
                return finalHash;
            }

            function decryptQrData(encryptedData) {
                try {
                    const checksum = encryptedData.substring(encryptedData.length - 4);
                    const encodedData = encryptedData.substring(0, encryptedData.length - 4);
                    
                    const calculatedChecksum = customHash(encodedData).substring(0, 4);
                    if (checksum !== calculatedChecksum) throw new Error("Checksum Error");
                    
                    const decodedBytes = atob(encodedData);
                    
                    let decryptedData = '';
                    for (let i = 0; i < decodedBytes.length; i++) {
                        const charCode = decodedBytes.charCodeAt(i);
                        const keyCharCode = SECRET_KEY.charCodeAt(i % SECRET_KEY.length);
                        decryptedData += String.fromCharCode(charCode ^ keyCharCode);
                    }
                    return decryptedData;
                } catch (error) {
                    return null;
                }
            }

            function formatDate(dateStr) {
                const date = new Date(dateStr);
                return date.toLocaleDateString('id-ID', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
            }

            // Cek masa berlaku 6 bulan (sekitar 180 hari)
            function checkExpiry(createdAtStr) {
                const createdDate = new Date(createdAtStr);
                const now = new Date();
                const diffTime = now - createdDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                if (diffDays < 0) return { valid: false, text: "Tanggal Tidak Valid" };
                if (diffDays > 180) return { valid: false, text: `Masa Berlaku Habis (${diffDays} Hari)` };
                
                return { valid: true, text: `Aktif (Sisa ${180 - diffDays} Hari)` };
            }

            function updateUISuccess(data) {
                resultsDiv.innerHTML = `
                    <div class="status-section">
                        <div class="status-badge success"><i class="fas fa-check-circle"></i> DOKUMEN VALID</div>
                        <div class="status-desc">Dokumen ini telah diverifikasi keasliannya.</div>
                    </div>
                    
                    <div class="data-list-container">
                        <div class="data-list-header">Detail Mahasiswa</div>
                        <ul class="data-list">
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-user"></i> Nama</span>
                                <span class="data-value">${data.nama}</span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-id-card"></i> NIM</span>
                                <span class="data-value">${data.nim}</span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-file-alt"></i> Jenis Surat</span>
                                <span class="data-value">${data.namaSurat}</span>
                            </li>
                        </ul>
                        
                        <div class="data-list-header" style="margin-top: 25px;">Detail Verifikasi</div>
                        <ul class="data-list">
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-user-tie"></i> Pejabat</span>
                                <span class="data-value">${data.pejabat}</span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-briefcase"></i> Jabatan</span>
                                <span class="data-value">${data.jabatan}</span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-calendar"></i> Tanggal Cetak</span>
                                <span class="data-value">${formatDate(data.createdAt)}</span>
                            </li>
                             <li class="data-item">
                                <span class="data-label"><i class="fas fa-key"></i> Serial</span>
                                <span class="data-value" style="font-family: monospace; font-size: 0.8rem;">${data.serial}</span>
                            </li>
                             <li class="data-item">
                                <span class="data-label"><i class="fas fa-clock"></i> Status</span>
                                <span class="data-value" style="color: ${data.expiry.valid ? '#28a745' : '#dc3545'}">
                                    <i class="fas ${data.expiry.valid ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
                                    ${data.expiry.text}
                                </span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-print"></i> Dicetak Oleh</span>
                                <!-- PERBAIKAN: class="data-value" agar rapi kanan -->
                                <span class="data-value">${data.adminInfo}</span>
                            </li>
                        </ul>
                    </div>
                `;
            }

            function updateUIFailed(title, message) {
                resultsDiv.innerHTML = `
                    <div class="status-section">
                        <div class="status-badge failed"><i class="fas fa-times-circle"></i> VERIFIKASI GAGAL</div>
                        <div class="status-desc"><strong>${title}</strong><br>${message}</div>
                    </div>
                `;
            }

            // --- MAIN PROCESS ---
            try {
                const decryptedData = decryptQrData(encryptedData);
                
                if (!decryptedData) throw new Error("Gagal dekripsi");

                // Format BARU: nim|tanggal|pejabat|jabatan|nama_mhs|nama_surat|hash|serial|admin_info
                const parts = decryptedData.split('|');
                if (parts.length < 9) throw new Error("Format data tidak lengkap ("+parts.length+")");

                const nim = parts[0];
                const createdAt = parts[1];
                const pejabat = parts[2];
                const jabatan = parts[3];
                const nama = parts[4];
                const namaSurat = parts[5];
                const hash = parts[6];
                const serial = parts[7];
                const adminInfo = parts[8];

                if (version !== ALGORITHM_VERSION) {
                    updateUIFailed("Versi Lama", "Versi algoritma tidak didukung.");
                    return;
                }

                // Validasi Hash
                // Urutan: nim-tanggal-pejabat-jabatan-nama-serial-admin_info
                const stringToHash = `${nim}-${createdAt}-${pejabat}-${jabatan}-${nama}-${serial}-${adminInfo}`;
                const generatedHash = customHash(stringToHash);

                if (generatedHash === hash) {
                    const expiry = checkExpiry(createdAt);
                    updateUISuccess({
                        nim, createdAt, pejabat, jabatan, nama, namaSurat, serial, expiry, adminInfo
                    });
                } else {
                    updateUIFailed("Data Tidak Cocok", "Hash tidak valid. Data mungkin telah diubah.");
                }

            } catch (error) {
                console.error(error);
                updateUIFailed("Error Sistem", error.message);
            }
        });
    </script>
</body>
</html>
