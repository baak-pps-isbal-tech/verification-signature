<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISURATS2 - Verifikasi Dokumen Digital</title>
    
    <!-- Library Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Library SHA256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>

    <style>
        :root {
            --primary-color: #004A7C;
            --secondary-color: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --border-color: #dee2e6;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .popup-overlay {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
            margin: 20px;
            border: 1px solid #e0e0e0;
        }

        /* --- Header / Status Section --- */
        .header-status {
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header-status.valid {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }
        
        .header-status.invalid {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .status-icon {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            font-size: 2rem;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .header-status h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .header-status p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* --- Content Body --- */
        .content-body {
            padding: 25px;
        }

        /* --- Card Sections --- */
        .info-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .card-header {
            background-color: #f8f9fa;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .card-header i {
            margin-right: 8px;
        }

        .card-body {
            padding: 15px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
        
        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            font-size: 0.85rem;
            color: #6c757d;
            min-width: 100px;
        }
        
        .data-value {
            font-size: 0.95rem;
            color: var(--dark-color);
            font-weight: 600;
            text-align: right;
            flex-grow: 1;
            word-break: break-word;
        }

        /* --- Footer --- */
        .app-footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            color: #adb5bd;
            border-top: 1px solid #f1f1f1;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="popup-overlay">
        <!-- Header Status (Akan diisi JS) -->
        <div class="header-status valid" id="header-section">
            <div class="status-icon"><i class="fas fa-check"></i></div>
            <h1>DOKUMEN VALID</h1>
            <p>Verifikasi berhasil ditemukan</p>
        </div>

        <div class="content-body" id="content-section">
            <!-- Loading State Default -->
            <div style="text-align:center; padding: 20px;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color:#ccc"></i>
                <p style="color:#888; margin-top:10px; font-size:0.9rem;">Memvalidasi data...</p>
            </div>
        </div>
        
        <div class="app-footer">
            Institut Sains dan Bisnis Atma Luhur &bull; Program Pascasarjana
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- KONFIGURASI KEAMANAN ---
            const SECRET_KEY = "ISB_ATMA_LUHUR_KTM_2023_SECURE_KEY";
            const ALGORITHM_VERSION = "1.0";

            // --- FUNGSI HASH & DECRYPT ---
            function customHash(data) {
                const sha256Hash = sha256(data);
                const partLength = Math.floor(sha256Hash.length / 4);
                const parts = [
                    sha256Hash.substring(0, partLength),
                    sha256Hash.substring(partLength, 2*partLength),
                    sha256Hash.substring(2*partLength, 3*partLength),
                    sha256Hash.substring(3*partLength)
                ];
                const rotatedParts = parts.map((part, i) => {
                    const rotation = (i + 1) % part.length;
                    return part.substring(rotation) + part.substring(0, rotation);
                });
                return sha256(rotatedParts.join('') + SECRET_KEY);
            }

            function decryptQrData(encryptedData) {
                try {
                    const checksum = encryptedData.slice(-4);
                    const encodedData = encryptedData.slice(0, -4);
                    if (customHash(encodedData).substring(0, 4) !== checksum) return null;
                    const decodedBytes = atob(encodedData);
                    let decrypted = '';
                    for (let i = 0; i < decodedBytes.length; i++) {
                        decrypted += String.fromCharCode(decodedBytes.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
                    }
                    return decrypted;
                } catch (e) { return null; }
            }

            function formatDate(dateStr) {
                if(!dateStr) return "-";
                try {
                    const date = new Date(dateStr);
                    return date.toLocaleDateString('id-ID', { 
                        day: 'numeric', month: 'long', year: 'numeric', 
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch(e) { return dateStr; }
            }

            // --- PROSES UTAMA ---
            const urlParams = new URLSearchParams(window.location.search);
            const version = urlParams.get('v');
            const encryptedData = urlParams.get('d');
            
            const headerDiv = document.getElementById('header-section');
            const contentDiv = document.getElementById('content-section');

            if (!version || !encryptedData) {
                headerDiv.className = "header-status invalid";
                headerDiv.innerHTML = `<div class="status-icon"><i class="fas fa-link-broken"></i></div><h1>ERROR</h1><p>URL tidak valid</p>`;
                contentDiv.innerHTML = "";
                return;
            }

            try {
                const decrypted = decryptQrData(encryptedData);
                if (!decrypted) throw new Error("Dekripsi gagal");

                // FORMAT: type|nim|nama|date|signer|serial|hash|token
                const parts = decrypted.split('|');
                if (parts.length < 8) throw new Error("Format data tidak valid");

                const [docType, nim, nama, createdAt, signerName, serial, hash, timeToken] = parts;

                // 1. Validasi Hash
                // Hash dihitung dari: nim-date-signer-serial
                const stringToHash = `${nim}-${createdAt}-${signerName}-${serial}`;
                const validHash = customHash(stringToHash);

                // 2. Validasi Token Waktu
                const today = new Date().toISOString().split('T')[0];
                const expectedToken = customHash(`${nim}-${today}-${SECRET_KEY}`);
                const isTimeValid = (timeToken === expectedToken);

                // 3. Render UI
                if (validHash === hash) {
                    // --- VALID ---
                    headerDiv.className = "header-status valid";
                    headerDiv.innerHTML = `
                        <div class="status-icon"><i class="fas fa-shield-alt"></i></div>
                        <h1>VALID</h1>
                        <p>Dokumen Asli & Terverifikasi</p>
                    `;

                    let docTitle = "Dokumen Digital";
                    if(docType === "SK_AKTIF") docTitle = "Surat Keterangan Aktif Kuliah";
                    else if(docType === "KTM_SEMENTARA") docTitle = "Kartu Tanda Mahasiswa Sementara";

                    contentDiv.innerHTML = `
                        <!-- Identitas Mahasiswa -->
                        <div class="info-card">
                            <div class="card-header"><i class="fas fa-user-graduate"></i> Identitas Pemilik</div>
                            <div class="card-body">
                                <div class="data-row">
                                    <span class="data-label">Nama Lengkap</span>
                                    <span class="data-value">${nama}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">NIM</span>
                                    <span class="data-value">${nim}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Info Dokumen -->
                        <div class="info-card">
                            <div class="card-header"><i class="fas fa-file-alt"></i> Informasi Dokumen</div>
                            <div class="card-body">
                                <div class="data-row">
                                    <span class="data-label">Jenis Surat</span>
                                    <span class="data-value">${docTitle}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">Nomor Serial</span>
                                    <span class="data-value" style="font-size:0.8rem; color:#888;">${serial}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">Waktu Terbit</span>
                                    <span class="data-value">${formatDate(createdAt)}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Penandatangan -->
                        <div class="info-card">
                            <div class="card-header"><i class="fas fa-pen-fancy"></i> Ditandatangani Oleh</div>
                            <div class="card-body">
                                <div class="data-row">
                                    <span class="data-label">Nama Pejabat</span>
                                    <span class="data-value">${signerName}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">Validitas</span>
                                    <span class="data-value" style="color:${isTimeValid ? '#28a745' : '#ffc107'}">
                                        ${isTimeValid ? 'Aktif (Valid Hari Ini)' : 'Token Kadaluarsa'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;

                } else {
                    // --- INVALID ---
                    headerDiv.className = "header-status invalid";
                    headerDiv.innerHTML = `
                        <div class="status-icon"><i class="fas fa-times-hexagon"></i></div>
                        <h1>TIDAK VALID</h1>
                        <p>Dokumen tidak dapat diverifikasi</p>
                    `;
                    contentDiv.innerHTML = `
                        <div style="text-align:center; padding: 20px; color: #dc3545;">
                            <i class="fas fa-exclamation-triangle fa-3x" style="margin-bottom:15px; opacity:0.5"></i>
                            <p>Hash tidak cocok. Dokumen ini mungkin telah mengalami pemalsuan atau rusak.</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error(error);
                headerDiv.className = "header-status invalid";
                headerDiv.innerHTML = `<div class="status-icon"><i class="fas fa-bug"></i></div><h1>ERROR</h1><p>Gagal memproses data</p>`;
                contentDiv.innerHTML = `<p style="color:#777; text-align:center; padding:10px;">${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
