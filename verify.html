<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISURATS2 - Verifikasi Dokumen Digital</title>
    
    <!-- Library Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Library SHA256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>

    <style>
        :root {
            --primary-color: #004A7C;
            --secondary-color: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --border-color: #dee2e6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .popup-overlay {
            width: 100%;
            max-width: 480px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
            margin: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header .icon-main {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
        }
        
        .header p {
            margin: 5px 0 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .content {
            padding: 25px;
        }

        .status-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .status-badge i {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .status-badge.valid {
            background-color: #e8f5e9;
            color: var(--success-color);
            border: 1px solid #c8e6c9;
        }
        
        .status-badge.invalid {
            background-color: #ffebee;
            color: var(--danger-color);
            border: 1px solid #ffcdd2;
        }

        .status-badge h2 {
            margin: 0;
            font-size: 1.3rem;
        }
        
        .status-badge p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
        }

        .data-card {
            background-color: var(--light-color);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .data-card-header {
            background-color: #e9ecef;
            padding: 12px 15px;
            font-weight: 600;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }
        
        .data-card-header i {
            margin-right: 10px;
            color: var(--primary-color);
        }

        .data-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        .data-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-list li:last-child {
            border-bottom: none;
        }
        
        .data-list .label {
            font-weight: 500;
            color: #6c757d;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }
        
        .data-list .label i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .data-list .value {
            font-weight: 600;
            color: var(--dark-color);
            text-align: right;
            word-break: break-word;
        }

        .footer {
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #6c757d;
            border-top: 1px solid var(--border-color);
            background-color: #fafafa;
        }

        /* Animasi */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="popup-overlay">
        <div class="header">
            <div class="icon-main"><i class="fas fa-shield-alt"></i></div>
            <h1 id="doc-title">Memproses...</h1>
            <p>Institut Sains dan Bisnis Atma Luhur</p>
        </div>
        <div class="content" id="results">
            <div style="text-align:center; padding: 20px; color: #6c757d;">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p style="margin-top:10px;">Memverifikasi keaslian dokumen...</p>
            </div>
        </div>
        <div class="footer">
            IT Division BAAK Program Pascasarjana &copy; 2024
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- KONFIGURASI KEAMANAN (HARUS SAMA DENGAN PYTHON) ---
            const SECRET_KEY = "ISB_ATMA_LUHUR_KTM_2023_SECURE_KEY";
            const NAMA_PETUGAS_PYTHON = "R Burham Isnanto F., S.Si., M.Kom., M.M.";
            const ALGORITHM_VERSION = "1.0";

            // --- KONFIGURASI JENIS DOKUMEN (DINAMIS) ---
            const DOC_TYPES = {
                'SK_AKTIF': {
                    name: 'Surat Keterangan Aktif Kuliah',
                    icon: 'fa-file-contract',
                    fields: [
                        { key: 1, label: 'NIM', icon: 'fa-id-card' },
                        { key: 2, label: 'Nama Mahasiswa', icon: 'fa-user' },
                        { key: 3, label: 'Tanggal Dibuat', icon: 'fa-calendar-check', type: 'datetime' },
                        { key: 4, label: 'Serial Number', icon: 'fa-barcode' }
                    ]
                },
                'KTM_SEMENTARA': {
                    name: 'KTM Sementara',
                    icon: 'fa-id-badge',
                    fields: [
                        { key: 1, label: 'NIM', icon: 'fa-id-card' },
                        { key: 3, label: 'Tanggal Cetak', icon: 'fa-calendar', type: 'datetime' },
                        { key: 4, label: 'Serial Number', icon: 'fa-barcode' }
                    ]
                }
                // Tambahkan jenis surat baru di sini nanti...
            };

            const urlParams = new URLSearchParams(window.location.search);
            const version = urlParams.get('v');
            const encryptedData = urlParams.get('d');
            const resultsDiv = document.getElementById('results');
            const docTitle = document.getElementById('doc-title');

            // --- FUNGSI UTILITAS ---
            function customHash(data) {
                const sha256Hash = sha256(data);
                const partLength = Math.floor(sha256Hash.length / 4);
                const parts = [
                    sha256Hash.substring(0, partLength),
                    sha256Hash.substring(partLength, 2*partLength),
                    sha256Hash.substring(2*partLength, 3*partLength),
                    sha256Hash.substring(3*partLength)
                ];
                const rotatedParts = parts.map((part, i) => {
                    const rotation = (i + 1) % part.length;
                    return part.substring(rotation) + part.substring(0, rotation);
                });
                return sha256(rotatedParts.join('') + SECRET_KEY);
            }

            function decryptQrData(encryptedData) {
                try {
                    const checksum = encryptedData.slice(-4);
                    const encodedData = encryptedData.slice(0, -4);
                    
                    if (customHash(encodedData).substring(0, 4) !== checksum) return null;

                    const decodedBytes = atob(encodedData);
                    let decrypted = '';
                    for (let i = 0; i < decodedBytes.length; i++) {
                        decrypted += String.fromCharCode(decodedBytes.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
                    }
                    return decrypted;
                } catch (e) { return null; }
            }

            function formatDate(dateStr) {
                if(!dateStr) return "-";
                try {
                    const date = new Date(dateStr);
                    return date.toLocaleDateString('id-ID', { 
                        day: 'numeric', month: 'long', year: 'numeric', 
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch(e) { return dateStr; }
            }

            // --- PROSES UTAMA ---
            if (!version || !encryptedData) {
                docTitle.innerText = "Error";
                resultsDiv.innerHTML = `<div class="status-badge invalid"><i class="fas fa-link-broken"></i><h2>URL Tidak Valid</h2><p>Parameter verifikasi tidak ditemukan.</p></div>`;
                return;
            }

            try {
                const decrypted = decryptQrData(encryptedData);
                if (!decrypted) throw new Error("Dekripsi gagal");

                // FORMAT: type|nim|date|hash|serial|token
                const parts = decrypted.split('|');
                if (parts.length < 6) throw new Error("Format data lama/tidak valid");

                const [docType, nim, createdAt, hash, serial, timeToken] = parts;

                // 1. Cek Konfigurasi Jenis Dokumen
                const docConfig = DOC_TYPES[docType] || { name: 'Dokumen Digital', icon: 'fa-file', fields: [] };
                docTitle.innerText = docConfig.name;

                // 2. Validasi Hash
                const stringToHash = `${nim}-${createdAt}-${NAMA_PETUGAS_PYTHON}-${serial}`;
                const validHash = customHash(stringToHash);

                // 3. Validasi Token Waktu
                const today = new Date().toISOString().split('T')[0];
                const expectedToken = customHash(`${nim}-${today}-${SECRET_KEY}`);
                const isTimeValid = (timeToken === expectedToken);

                // 4. Render Hasil
                if (validHash === hash) {
                    // -- VALID --
                    let fieldsHtml = '';
                    docConfig.fields.forEach(field => {
                        let val = parts[field.key]; // Ambil berdasarkan index di 'parts'
                        if(field.type === 'datetime') val = formatDate(val);
                        
                        fieldsHtml += `
                            <li>
                                <span class="label"><i class="fas ${field.icon}"></i> ${field.label}</span>
                                <span class="value">${val || '-'}</span>
                            </li>
                        `;
                    });

                    resultsDiv.innerHTML = `
                        <div class="status-badge valid">
                            <i class="fas fa-check-circle"></i>
                            <h2>Dokumen VALID</h2>
                            <p>Dokumen ini diterbitkan secara resmi oleh Pascasarjana ISB Atma Luhur</p>
                        </div>
                        <div class="data-card">
                            <div class="data-card-header">
                                <i class="fas fa-info-circle"></i> Detail Verifikasi
                            </div>
                            <ul class="data-list">
                                ${fieldsHtml}
                                <li>
                                    <span class="label"><i class="fas fa-clock"></i> Status Waktu</span>
                                    <span class="value" style="color: ${isTimeValid ? '#28a745' : '#ffc107'}">
                                        ${isTimeValid ? 'Aktif' : 'Token Kadaluarsa'}
                                    </span>
                                </li>
                            </ul>
                        </div>
                    `;
                } else {
                    // -- INVALID --
                    resultsDiv.innerHTML = `
                        <div class="status-badge invalid">
                            <i class="fas fa-times-circle"></i>
                            <h2>Dokumen TIDAK VALID</h2>
                            <p>Tanda tangan digital tidak cocok atau data telah diubah.</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error(error);
                docTitle.innerText = "Error Sistem";
                resultsDiv.innerHTML = `
                    <div class="status-badge invalid">
                        <i class="fas fa-bug"></i>
                        <h2>Gagal Memproses</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
