<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISURATS2 - Verifikasi Digital</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- SHA256 Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>

    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #004A7C 0%, #0056b3 100%);
            --success-gradient: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            --danger-gradient: linear-gradient(135deg, #dc3545 0%, #bd2130 100%);
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --bg-light: #f5f6fa;
            --white: #ffffff;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .verification-wrapper { width: 100%; max-width: 420px; margin: 20px; position: relative; }
        .card {
            background: var(--white); border-radius: 20px;
            box-shadow: var(--card-shadow); overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-header {
            background: var(--primary-gradient); padding: 30px 20px;
            text-align: center; color: var(--white);
        }
        .card-header img {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.9); padding: 5px;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); object-fit: contain;
        }
        .card-header h1 { margin: 0; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
        .card-header .sub-title { margin: 5px 0 0 0; opacity: 0.9; font-size: 0.9rem; line-height: 1.4; }
        .card-body { padding: 0; }
        
        /* Status & Data Styles */
        .status-section { padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .status-badge {
            display: inline-flex; align-items: center; padding: 10px 20px; border-radius: 50px;
            color: white; font-weight: 600; font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px;
        }
        .status-badge.success { background: var(--success-gradient); }
        .status-badge.failed { background: var(--danger-gradient); }
        .status-badge i { margin-right: 8px; font-size: 1.1rem; }
        .status-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .data-list-container { padding: 20px; }
        .data-list-header {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            color: #fff; font-weight: 700; margin-bottom: 15px; padding: 8px 15px;
            background: var(--primary-gradient); border-radius: 4px; display: inline-block;
        }
        .data-list { list-style: none; padding: 0; margin: 0; }
        .data-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 12px 0; border-bottom: 1px dashed #eee;
        }
        .data-item:last-child { border-bottom: none; }
        .data-label { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; }
        .data-label i { margin-right: 8px; width: 16px; text-align: center; color: #a4b0be; }
        .data-value {
            font-weight: 600; color: var(--text-dark); text-align: right;
            font-size: 0.9rem; max-width: 60%; word-break: break-word;
        }

        /* Footer */
        .card-footer {
            background: #fafafa; padding: 15px; text-align: center;
            font-size: 0.8rem; color: #6c757d; line-height: 1.6;
        }
        .card-footer a { color: #0056b3; text-decoration: none; font-weight: 600; }
        .card-footer a:hover { text-decoration: underline; }

        /* Loading & Animations */
        .loading-state { padding: 60px 20px; text-align: center; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color); border-radius: 50%;
            margin: 0 auto 20px auto; animation: spin 1s linear infinite;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="verification-wrapper">
        <div class="card" id="mainCard">
            <div class="card-header">
                <img src="Logo_ISB_atma_luhur_final.png" alt="Logo ISB Atma Luhur">
                <h1>Verifikasi Dokumen Digital</h1>
                <div class="sub-title">
                    SISURATS2 v.1.0.3<br>Sistem Informasi Surat Akademik S2<br>Program Pascasarjana<br>
                    Institut Sains dan Bisnis Atma Luhur
                </div>
            </div>
            <div class="card-body" id="results">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p style="color: var(--text-muted);">Memvalidasi keaslian dokumen...</p>
                </div>
            </div>
            <div class="card-footer">
                IT Division Biro Administrasi Akademik & Kemahasiswaan<br>Program Pascasarjana - ISB Atma Luhur<br>
                <a href="https://pasca.atmaluhur.ac.id" target="_blank"><i class="fas fa-globe"></i> pasca.atmaluhur.ac.id</a>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const SECRET_KEY = "ISB_ATMA_LUHUR_KTM_2023_SECURE_KEY";
            const ALGORITHM_VERSION = "1.0";
            const urlParams = new URLSearchParams(window.location.search);
            const version = urlParams.get('v');
            const encryptedData = urlParams.get('d');
            const resultsDiv = document.getElementById('results');

            if (!version || !encryptedData) {
                updateUIFailed("URL Tidak Valid", "Parameter verifikasi tidak ditemukan.");
                return;
            }

            function customHash(data) {
                const sha256Hash = sha256(data); const partLength = Math.floor(sha256Hash.length / 4);
                const parts = [sha256Hash.substring(0, partLength), sha256Hash.substring(partLength, 2*partLength), sha256Hash.substring(2*partLength, 3*partLength), sha256Hash.substring(3*partLength)];
                const rotatedParts = [];
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i]; const rotation = (i + 1) % part.length;
                    rotatedParts.push(part.substring(rotation) + part.substring(0, rotation));
                }
                return sha256(rotatedParts.join('') + SECRET_KEY);
            }

            function decryptQrData(encryptedData) {
                try {
                    const checksum = encryptedData.substring(encryptedData.length - 4);
                    const encodedData = encryptedData.substring(0, encryptedData.length - 4);
                    if (customHash(encodedData).substring(0, 4) !== checksum) throw new Error("Checksum Error");
                    const decodedBytes = atob(encodedData);
                    let decryptedData = '';
                    for (let i = 0; i < decodedBytes.length; i++) {
                        decryptedData += String.fromCharCode(decodedBytes.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
                    }
                    return decryptedData;
                } catch (error) { return null; }
            }

            function formatCustomDate(dateStr) {
                const date = new Date(dateStr + 'Z');
                const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                const day = date.getDate(); const monthIndex = date.getMonth(); const year = date.getFullYear();
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                return `${day} ${monthNames[monthIndex]} ${year}, ${hours}.${minutes}.${seconds}`;
            }

            function checkExpiry(createdAtStr) {
                const createdDate = new Date(createdAtStr + 'Z'); const now = new Date();
                const diffTime = now - createdDate; const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays < 0) return { valid: false, text: "Tanggal Tidak Valid" };
                if (diffDays > 180) return { valid: false, text: `Kadaluarsa (${diffDays} Hari)` };
                return { valid: true, text: `Aktif (Sisa ${180 - diffDays} Hari)` };
            }

            function updateUISuccess(data) {
                const expiryClass = data.expiry.valid ? 'success' : 'failed';
                
                // --- LOGIKA DINAMIS UNTUK BERBAGAI JENIS SURAT ---
                const isJadwal = data.namaSurat === "Surat Keterangan Jadwal Perkuliahan";
                const isSuratTugasDosen = data.namaSurat === "Surat Tugas Dosen";
                const isPembelianBarang = data.namaSurat === "Surat Permohonan Pembelian Barang Perkuliahan";
                
                // Tentukan Header Identitas
                let identityHeader = "Identitas Pemohon";
                if (isJadwal) identityHeader = "Identitas Surat";
                if (isPembelianBarang) identityHeader = "Identitas Ditujukan";
                
                // Tentukan Label Baris Pertama (Nama)
                let label1Text = "Nama";
                let label1Icon = "fa-user";
                if (isJadwal) { label1Text = "Ditujukan Kepada"; label1Icon = "fa-users"; }
                if (isPembelianBarang) { label1Text = "Ditujukan"; label1Icon = "fa-building"; }
                
                // Tentukan Label & Icon Baris Kedua (NIM/Tahun Ajaran/NIDN)
                let label2Text = "NIM";
                let label2Icon = "fa-id-card";
                
                if (isJadwal) { label2Text = "Tahun Ajaran"; label2Icon = "fa-calendar-alt"; }
                else if (isSuratTugasDosen) { label2Text = "NIDN"; label2Icon = "fa-fingerprint"; }
                
                // Kondisi tampil baris kedua (Untuk SPBB dihilangkan dari sini, karena NIM selalu "-" maka otomatis tidak tampil)
                const showSecondRow = isJadwal || (data.nim && data.nim !== "-" && data.nim.trim() !== "");

                let dynamicIdentityRows = '';
                
                // 1. Baris Nama / Ditujukan Kepada / Ditujukan
                dynamicIdentityRows += `
                <li class="data-item">
                    <span class="data-label"><i class="fas ${label1Icon}"></i> ${label1Text}</span>
                    <span class="data-value">${data.nama}</span>
                </li>`;

                // 2. Baris NIM / Tahun Ajaran (Untuk Pembelian Barang tidak ditampilkan karena NIM = "-")
                if (showSecondRow) {
                    dynamicIdentityRows += `
                    <li class="data-item">
                        <span class="data-label"><i class="fas ${label2Icon}"></i> ${label2Text}</span>
                        <span class="data-value">${data.nim}</span>
                    </li>`;
                }

                // 3. Nomor Surat
                dynamicIdentityRows += `
                <li class="data-item">
                    <span class="data-label"><i class="fas fa-hashtag"></i> Nomor Surat</span>
                    <span class="data-value" style="font-size: 0.85rem;">${data.nomorSuratFull}</span>
                </li>`;

                // 4. Jenis Surat
                dynamicIdentityRows += `
                <li class="data-item">
                    <span class="data-label"><i class="fas fa-file-alt"></i> Jenis Surat</span>
                    <span class="data-value">${data.namaSurat}</span>
                </li>`;

                resultsDiv.innerHTML = `
                    <div class="status-section">
                        <div class="status-badge ${expiryClass}"><i class="fas ${data.expiry.valid ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${data.expiry.valid ? 'DOKUMEN VALID' : 'DOKUMEN KADALUARSA'}</div>
                        <div class="status-desc">${data.expiry.valid ? 'Tanda tangan digital valid dan terverifikasi.' : 'Masa berlaku dokumen telah berakhir.'}</div>
                    </div>
                    
                    <div class="data-list-container">
                        <div class="data-list-header">${identityHeader}</div>
                        <ul class="data-list">
                            ${dynamicIdentityRows}
                        </ul>
                        
                        <div class="data-list-header" style="margin-top: 25px;">Detail Verifikasi</div>
                        <ul class="data-list">
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-user-tie"></i> Ditandatangani Oleh</span>
                                <span class="data-value">${data.pejabat} [${data.idPegawai}]</span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-briefcase"></i> Jabatan</span>
                                <span class="data-value">${data.jabatan}</span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-calendar"></i> Tanggal Cetak</span>
                                <span class="data-value">${formatCustomDate(data.createdAt)}</span>
                            </li>
                             <li class="data-item">
                                <span class="data-label"><i class="fas fa-key"></i> Serial Number</span>
                                <span class="data-value" style="font-family: monospace; font-size: 0.8rem;">${data.serial}</span>
                            </li>
                             <li class="data-item">
                                <span class="data-label"><i class="fas fa-clock"></i> Status Dokumen</span>
                                <span class="data-value" style="color: ${data.expiry.valid ? '#28a745' : '#dc3545'}">
                                    <i class="fas ${data.expiry.valid ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
                                    ${data.expiry.text}
                                </span>
                            </li>
                            <li class="data-item">
                                <span class="data-label"><i class="fas fa-print"></i> Dicetak Oleh</span>
                                <span class="data-value">${data.adminInfo}</span>
                            </li>
                        </ul>
                    </div>
                `;
            }

            function updateUIFailed(title, message) {
                resultsDiv.innerHTML = `
                    <div class="status-section">
                        <div class="status-badge failed"><i class="fas fa-times-circle"></i> VERIFIKASI GAGAL</div>
                        <div class="status-desc"><strong>${title}</strong><br>${message}</div>
                    </div>
                `;
            }

            // --- MAIN PROCESS ---
            try {
                const decryptedData = decryptQrData(encryptedData);
                if (!decryptedData) throw new Error("Gagal dekripsi");

                const parts = decryptedData.split('|');
                // Format Data (11 parts): 
                // 0:nim | 1:tanggal | 2:pejabat | 3:jabatan | 4:id_pegawai | 
                // 5:nama | 6:nomor_surat | 7:nama_surat | 8:hash | 9:serial | 10:admin_info
                
                if (parts.length < 11) throw new Error("Format data tidak lengkap");

                const nim = parts[0];
                const createdAt = parts[1];
                const pejabat = parts[2];
                const jabatan = parts[3];
                const idPegawai = parts[4];
                const nama = parts[5];
                const nomorSuratFull = parts[6];
                const namaSurat = parts[7]; 
                const hash = parts[8];
                const serial = parts[9];
                const adminInfo = parts[10];

                if (version !== ALGORITHM_VERSION) {
                    updateUIFailed("Versi Lama", "Versi algoritma tidak didukung.");
                    return;
                }

                // --- LOGIKA VERIFIKASI BACKWARD COMPATIBLE ---
                
                let isVerified = false;
                
                // 1. Coba Verifikasi Format BARU (Dengan Nama Surat di Hash)
                let stringToHashNew = `${nim}-${createdAt}-${pejabat}-${jabatan}-${idPegawai}-${nama}-${nomorSuratFull}-${namaSurat}-${serial}-${adminInfo}`;
                let generatedHashNew = customHash(stringToHashNew);
                
                if (generatedHashNew === hash) {
                    isVerified = true;
                } else {
                    // 2. Jika Gagal, Coba Verifikasi Format LAMA (Tanpa Nama Surat di Hash)
                    let stringToHashOld = `${nim}-${createdAt}-${pejabat}-${jabatan}-${idPegawai}-${nama}-${nomorSuratFull}-${serial}-${adminInfo}`;
                    let generatedHashOld = customHash(stringToHashOld);
                    
                    if (generatedHashOld === hash) {
                        isVerified = true;
                    }
                }
                
                // ----------------------------------------------

                if (isVerified) {
                    const expiry = checkExpiry(createdAt);
                    updateUISuccess({
                        nim, createdAt, pejabat, jabatan, idPegawai, nama, nomorSuratFull, namaSurat, serial, expiry, adminInfo
                    });
                } else {
                    updateUIFailed("Data Tidak Cocok", "Hash tidak valid. Dokumen mungkin telah diubah.");
                }

            } catch (error) {
                console.error(error);
                updateUIFailed("Error Sistem", error.message);
            }
        });
    </script>
</body>
</html>
